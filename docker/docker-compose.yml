version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vubq-postgres
    environment:
      POSTGRES_DB: vubq_grocery
      POSTGRES_USER: vubq
      POSTGRES_PASSWORD: vubq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: vubq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/vubq_grocery
      DB_USERNAME: vubq
      DB_PASSWORD: vubq
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JAVA_HOME: /opt/java/openjdk
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ../frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

